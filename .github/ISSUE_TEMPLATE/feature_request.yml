name: Feature request
description: Suggest a scoped improvement for NowFlow Community.
title: '[Feature]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: 'Please keep requests scoped to the community edition. Enterprise-only needs can go to https://nowflow.io.'
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to change?
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This request is for the open-source community edition.
          required: true
        - label: This request does not require mobile apps, Kubernetes manifests, or enterprise-only admin surfaces.
          required: true
