name: Security

on:
  schedule:
    # Mondays at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}
  cancel-in-progress: false

# Both checks share npm install + checkout. Gitleaks needs full history
# (fetch-depth: 0); npm audit doesn't, but the extra clone time is small
# next to the savings from collapsing two jobs into one.
jobs:
  audit:
    name: npm audit + gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: npm audit (high+)
        if: ${{ !cancelled() }}
        run: npm audit --audit-level=high

      - name: Gitleaks secret scan
        if: ${{ !cancelled() }}
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
